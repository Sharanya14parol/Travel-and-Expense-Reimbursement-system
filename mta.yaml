_schema-version: 3.3.0
ID: travel_expense_app
version: 1.0.0
description: "Welcome to your new CAP project."
parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
modules:
  - name: travel_expense_app-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api # required by consumers of CAP services (e.g. approuter)
        properties:
          srv-url: ${default-url}
    requires:
      - name: travel_expense_app-db
      - name: travel_expense_app-destination

  - name: travel_expense_app-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: travel_expense_app-db
  - name: travel_expense_app
    type: approuter.nodejs
    path: app/router
    parameters:
      keep-existing-routes: true
      disk-quota: 256M
      memory: 256M
    requires:
      - name: srv-api
        group: destinations
        properties:
          name: srv-api # must be used in xs-app.json as well
          url: ~{srv-url}
          forwardAuthToken: true
      - name: travel_expense_app-html5-runtime
    provides:
      - name: app-api
        properties:
          app-protocol: ${protocol}
          app-uri: ${default-uri}

  - name: travel_expense_app-app-deployer
    type: com.sap.application.content
    path: gen
    build-parameters:
      build-result: app/
      requires:
        - name: travel_expense_appemployees
          artifacts:
            - employees.zip
          target-path: app/
        - name: travel_expense_appexpense_claims
          artifacts:
            - expense_claims.zip
          target-path: app/
        - name: travel_expense_appexpense_policies
          artifacts:
            - expense_policies.zip
          target-path: app/
        - name: travel_expense_appfinance_advance_approval
          artifacts:
            - finance_advance_approval.zip
          target-path: app/
        - name: travel_expense_appfinance_expense_approval
          artifacts:
            - finance_expense_approval.zip
          target-path: app/
        - name: travel_expense_apptravel_requests
          artifacts:
            - travel_requests.zip
          target-path: app/
    requires:
      - name: srv-api
      - name: travel_expense_app-html5-repo-host
        parameters:
          content-target: true
          config:
            HTML5Runtime_enabled: true

  - name: travel_expense_appemployees
    type: html5
    path: app/employees
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []
  - name: travel_expense_appexpense_claims
    type: html5
    path: app/expense_claims
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []
  - name: travel_expense_appexpense_policies
    type: html5
    path: app/expense_policies
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []
  - name: travel_expense_appfinance_advance_approval
    type: html5
    path: app/finance_advance_approval
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []
  - name: travel_expense_appfinance_expense_approval
    type: html5
    path: app/finance_expense_approval
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []
  - name: travel_expense_apptravel_requests
    type: html5
    path: app/travel_requests
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []

  - name: travel_expense_app-destinations
    type: com.sap.application.content
    requires:
      - name: travel_expense_app-html5-repo-host
        parameters:
          service-key:
            name: travel_expense_app-html5-repo-host-key
      - name: srv-api
      - name: travel_expense_app-destination
        parameters:
          content-target: true
    build-parameters:
      no-source: true
    parameters:
      content:
        instance:
          existing_destinations_policy: update
          destinations:
            - Name: travel_expense_app-html5-repository
              ServiceInstanceName: travel_expense_app-html5-repo-host
              ServiceKeyName: travel_expense_app-html5-repo-host-key
              sap.cloud.service: travel_expense_app.service

resources:
  - name: travel_expense_app-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
  - name: travel_expense_app-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            existing_destinations_policy: update
            destinations:
              - Name: srv-api
                URL: ~{srv-api/srv-url}
                Authentication: NoAuthentication
                Type: HTTP
                ProxyType: Internet
                HTML5.ForwardAuthToken: true
                HTML5.DynamicDestination: true

    requires:
      - name: srv-api

  - name: travel_expense_app-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host
  - name: travel_expense_app-html5-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime
